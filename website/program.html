        <section class="content">
            <h1>The Program</h1>
            <p>Enter your details below to simulate the MatchPoint.ai analysis:</p>
            <form id="inputForm">
                <label for="height">Enter your height (cm):</label>
                <input type="number" id="height" required>

                <label for="strokeType">Select stroke type:</label>
                <select id="strokeType" required>
                    <option value="Forehand">Forehand</option>
                    <option value="Backhand">Backhand</option>
                </select>

                <button type="submit">Analyze Swing</button>
            </form>
            <p id="feedback"></p>
